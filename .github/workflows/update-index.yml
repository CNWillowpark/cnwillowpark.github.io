- name: Generate folder-based file list
        run: |
          python3 - <<'EOF'
          import os, re
          from collections import defaultdict

          folders = defaultdict(list)

          # First, register all non-hidden subdirectories (even empty ones)
          for entry in os.scandir('.'):
              if entry.is_dir() and not entry.name.startswith('.'):
                  folders[entry.name]  # just ensure the key exists

          # Then populate with html files
          for root, dirs, filenames in os.walk('.'):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for f in filenames:
                  if f.endswith('.html') and f != 'index.html':
                      path = os.path.join(root, f).lstrip('./')
                      parts = path.split('/')
                      if len(parts) == 1:
                          folders['__root__'].append(path)
                      else:
                          folders[parts[0]].append(path)

          html_parts = []

          # Root-level files first
          if '__root__' in folders:
              for f in sorted(folders.pop('__root__')):
                  name = f.replace('.html', '').replace('-', ' ').replace('_', ' ').title()
                  html_parts.append(f'      <li><a href="{f}">{name}</a></li>')

          # Then folders
          for folder, files in sorted(folders.items()):
              folder_label = folder.replace('-', ' ').replace('_', ' ').title()
              if files:
                  inner = '\n'.join(
                      f'          <li><a href="{f}">{f.split("/")[-1].replace(".html","").replace("-"," ").replace("_"," ").title()}</a></li>'
                      for f in sorted(files)
                  )
                  html_parts.append(
                      f'      <li>\n'
                      f'        <details>\n'
                      f'          <summary>📁 {folder_label}</summary>\n'
                      f'          <ul>\n{inner}\n          </ul>\n'
                      f'        </details>\n'
                      f'      </li>'
                  )
              else:
                  # Empty folder — show it but greyed out
                  html_parts.append(
                      f'      <li>\n'
                      f'        <details disabled>\n'
                      f'          <summary style="color: grey;">📁 {folder_label} <em>(coming soon)</em></summary>\n'
                      f'        </details>\n'
                      f'      </li>'
                  )

          items = '\n'.join(html_parts)

          with open('index.html', 'r') as fh:
              content = fh.read()

          new_content = re.sub(
              r'<!-- PAGE-LIST-START -->.*?<!-- PAGE-LIST-END -->',
              f'<!-- PAGE-LIST-START -->\n    <ul>\n{items}\n    </ul>\n    <!-- PAGE-LIST-END -->',
              content,
              flags=re.DOTALL
          )

          with open('index.html', 'w') as fh:
              fh.write(new_content)
          EOF
